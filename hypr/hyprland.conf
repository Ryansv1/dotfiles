########################################################################################
# RYAN'S HYPRLAND CONFIG (WORKSTATION)
########################################################################################

# --- Monitores ---
# Adapte 'DP-1' para o nome do seu monitor (verifique com 'hyprctl monitors')
monitor=,highres,auto,1

# --- Autostart ---
exec-once = waybar
exec-once = swaybg -m fill -i ~/Pictures/wallpapers/background.jpg
exec-once = dunst
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# --- Variáveis de Ambiente (Fundamentais para Dev/Wayland) ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland

# Descomente abaixo se usar NVIDIA
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1

# --- Input ---
input {
    kb_layout = br
    kb_variant = abnt2
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# --- Estética ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle # Estilo dinâmico que você vai gostar
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# --- Atalhos (Keybinds) ---
$mainMod = SUPER

bind = $mainMod, Q, exec, kitty          # Terminal
bind = $mainMod, C, killactive,          # Fechar janela
bind = $mainMod, M, exit,                # Sair do Hyprland
bind = $mainMod, E, exec, dolphin        # Arquivos
bind = $mainMod, V, togglefloating,      # Janela flutuante
bind = $mainMod, R, exec, wofi --show drun # Menu de apps
bind = $mainMod, P, pseudo,              # dwindle
bind = $mainMod, J, togglesplit,         # dwindle

# Mover foco com SUPER + setas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Alternar Workspaces (1-9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Mover janela para Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Mouse: arrastar e redimensionar
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
